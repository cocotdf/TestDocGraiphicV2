<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Graiphic toolkits documentation hosted on GitHub Pages.">
  <title>Graiphic Documentation</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #0f766e;
      --accent-color: #f97316;
      --body-color: #1f2937;
      --body-bg: #f8fafc;
      --sidebar-bg: #ffffff;
      --sidebar-border-color: #e2e8f0;
      --heading-color: #0f172a;
      --link-color: #0f766e;
      --code-theme-text: #0f172a;
      --sidebar-width: 300px;
    }

    body {
      background: radial-gradient(circle at top left, #ecfeff 0, #f8fafc 30%, #f8fafc 100%);
    }

    .app-name-link img {
      max-width: 180px;
    }

    .sidebar {
      position: relative;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--sidebar-border-color);
      box-shadow: 0 0 24px rgba(15, 23, 42, 0.03);
    }

    .markdown-section {
      max-width: 1100px;
      padding-bottom: 5rem;
    }

    .markdown-section a {
      font-weight: 500;
    }

    .markdown-section table {
      display: table;
      width: 100%;
      overflow: auto;
      border-collapse: collapse;
    }

    .markdown-section table th {
      background: #eff6ff;
    }

    .markdown-section td[width="64"] {
      width: 74px;
    }

    .markdown-section img.graiphic-param-icon {
      display: block;
      margin: 0 auto;
      max-width: 56px;
      height: auto;
    }

    .markdown-section td[width="30%"],
    .markdown-section td[width="25%"],
    .markdown-section td[width="35%"] {
      text-align: center;
      vertical-align: middle;
    }

    .markdown-section td[width="30%"] > p,
    .markdown-section td[width="25%"] > p,
    .markdown-section td[width="35%"] > p {
      margin: 0;
    }

    .markdown-section img.graiphic-param-detail-image {
      display: block;
      margin: 0 auto;
      width: auto;
      max-width: min(220px, 100%);
      height: auto;
    }

    .graiphic-video-embed {
      width: 100%;
      max-width: 520px;
      margin: 1.25rem 0;
    }

    .graiphic-video-frame {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
      background: #0f172a;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
    }

    .graiphic-video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .graiphic-video-caption {
      margin: 0.7rem 0 0;
      font-size: 0.95rem;
      color: #475569;
    }

    .search {
      order: 0;
      padding: 1rem 1rem 0.35rem;
      border-bottom: 0;
    }

    .search input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 0.75rem 0.9rem;
      background: #ffffff;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .search .results-panel {
      margin-top: 0.5rem;
      border-radius: 12px;
      border: 1px solid #dbe5ef;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.1);
      overflow: hidden;
      background: #ffffff;
    }

    .app-name {
      order: 1;
      margin: 0;
      padding: 0.25rem 1rem 1rem;
    }

    .app-name a {
      color: #334155;
      font-size: 1.18rem;
      font-weight: 300;
      line-height: 1.18;
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .app-name a:hover {
      color: #0f766e;
    }

    .sidebar-nav {
      order: 2;
      padding: 1rem 0 2rem;
    }

    .graiphic-home-hero {
      margin: 0 0 2rem;
      padding: 2rem 2.1rem;
      border: 1px solid #d8ecf2;
      border-radius: 30px;
      background:
        radial-gradient(circle at top right, rgba(251, 191, 36, 0.14), transparent 32%),
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 30%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98));
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.05);
    }

    .graiphic-home-kicker {
      margin: 0 0 1rem;
      font-size: clamp(1.9rem, 3.4vw, 2.7rem);
      font-weight: 650;
      line-height: 1.14;
      color: #0f172a;
      letter-spacing: -0.03em;
    }

    .graiphic-home-lead {
      margin: 0 0 1.35rem;
      max-width: 950px;
      font-size: 1.08rem;
      line-height: 1.7;
      color: #334155;
    }

    .graiphic-home-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin: 0 0 1.45rem;
    }

    .markdown-section .graiphic-home-pill {
      display: inline-flex;
      align-items: center;
      padding: 0.62rem 1rem;
      border-radius: 999px;
      background: #ecfeff;
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.08);
    }

    .graiphic-home-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin: 0 0 0.9rem;
    }

    .markdown-section a.graiphic-home-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      border: 1px solid #7dd3c7;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
    }

    .markdown-section a.graiphic-home-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      text-decoration: none;
    }

    .markdown-section a.graiphic-home-button-primary {
      background: #ecfeff;
      color: #0f766e;
    }

    .markdown-section a.graiphic-home-button-secondary {
      background: #ffffff;
      color: #0f766e;
    }

    .graiphic-home-note {
      margin: 0;
      color: #64748b;
      font-size: 0.97rem;
      line-height: 1.55;
    }

    .graiphic-home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1rem;
      margin: 1rem 0 2rem;
    }

    .markdown-section a.graiphic-home-card {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding: 1.1rem 1rem;
      border: 1px solid #dceaf1;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.82);
      color: #0f172a;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .markdown-section a.graiphic-home-card:hover {
      transform: translateY(-2px);
      border-color: #99f6e4;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
      text-decoration: none;
    }

    .graiphic-home-card-media {
      display: flex;
      align-items: center;
      min-height: 66px;
    }

    .graiphic-home-card-media img {
      max-height: 62px;
      width: auto;
      object-fit: contain;
    }

    .graiphic-home-card-title {
      font-size: 1.06rem;
      font-weight: 750;
      color: #0f172a;
    }

    .graiphic-home-card-copy {
      color: #475569;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .sidebar-resize-handle {
      position: absolute;
      top: 0;
      right: -4px;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      z-index: 30;
      background: transparent;
    }

    .sidebar-resize-handle::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 3px;
      width: 2px;
      background: transparent;
      transition: background-color 0.15s ease;
    }

    .sidebar-resize-handle:hover::after,
    body.is-resizing-sidebar .sidebar-resize-handle::after {
      background: #99f6e4;
    }

    .graiphic-nav {
      font-size: 14px;
    }

    .graiphic-nav-section + .graiphic-nav-section {
      margin-top: 0.55rem;
    }

    .graiphic-nav-section-title {
      padding: 0.2rem 0.9rem 0.3rem;
      color: #64748b;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .graiphic-nav-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .graiphic-nav-children {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .graiphic-nav-item {
      margin: 0;
    }

    .graiphic-nav-link,
    .graiphic-nav-toggle {
      display: flex;
      width: 100%;
      align-items: flex-start;
      gap: 0.3rem;
      min-height: 1.55rem;
      padding-top: 0.16rem;
      padding-bottom: 0.16rem;
      border-left: 2px solid transparent;
      text-decoration: none;
      line-height: 1.25;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .graiphic-nav-link:hover,
    .graiphic-nav-toggle:hover {
      background: #f8fafc;
      text-decoration: none;
    }

    .graiphic-nav-toggle {
      background: transparent;
      border-top: 0;
      border-right: 0;
      border-bottom: 0;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .graiphic-nav-toggle.is-category,
    .graiphic-nav-link.is-category {
      color: #56a06c;
      font-weight: 500;
    }

    .graiphic-nav-link.is-page {
      color: #111827;
      font-weight: 500;
    }

    .graiphic-nav-link.is-active,
    .graiphic-nav-toggle.is-active {
      color: var(--theme-color);
      background: #f0fdfa;
      border-left-color: var(--theme-color);
      font-weight: 700;
    }

    .graiphic-nav-chevron {
      width: 0.65rem;
      flex: 0 0 0.65rem;
      color: #94a3b8;
      font-size: 0.64rem;
      text-align: center;
      line-height: 1.2;
    }

    .graiphic-nav-label {
      flex: 1 1 auto;
      min-width: 0;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .graiphic-nav-more-button {
      width: 100%;
      padding-top: 0.18rem;
      padding-bottom: 0.18rem;
      background: transparent;
      border: 0;
      color: #94a3b8;
      font: inherit;
      font-size: 0.92em;
      text-align: left;
      cursor: pointer;
    }

    .graiphic-nav-more-button:hover {
      color: #64748b;
      background: #f8fafc;
    }

    .cover-main > p:last-child a {
      background: var(--theme-color);
      border-color: var(--theme-color);
    }

    @media screen and (min-width: 769px) {
      .sidebar {
        width: var(--sidebar-width);
      }

      .content {
        left: var(--sidebar-width);
      }
    }

    @media screen and (max-width: 768px) {
      .app-nav {
        position: static;
        margin: 0;
        padding: 0.75rem 3.9rem 0.45rem 0.85rem;
        text-align: left;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        background: rgba(255, 255, 255, 0.9);
        border-bottom: 1px solid var(--sidebar-border-color);
        backdrop-filter: blur(10px);
      }

      .app-nav ul {
        display: flex;
        flex-wrap: nowrap;
        gap: 0.45rem;
        margin: 0;
        padding: 0;
      }

      .app-nav li {
        display: block;
        flex: 0 0 auto;
        margin: 0;
        padding: 0;
      }

      .app-nav a {
        display: block;
        padding: 0.38rem 0.7rem;
        font-size: 0.92rem;
        line-height: 1.2;
        border: 1px solid #dbe5ef;
        border-radius: 999px;
        background: #fff;
      }

      .app-nav a.active {
        border-bottom: 1px solid #99f6e4;
        background: #f0fdfa;
      }

      .app-nav::-webkit-scrollbar {
        height: 0;
      }

      .github-corner {
        display: none;
      }

      .content {
        padding-top: 0;
      }

      .markdown-section {
        max-width: 100%;
        padding: 1.1rem 1rem 2.75rem;
      }

      .graiphic-home-hero {
        padding: 1.5rem 1.2rem;
        border-radius: 24px;
      }

      .graiphic-home-lead {
        font-size: 1rem;
      }

      .markdown-section a.graiphic-home-button {
        width: 100%;
        min-width: 0;
      }

      .markdown-section h1 {
        margin: 0 0 0.85rem;
        font-size: clamp(1.9rem, 8vw, 2.35rem);
        line-height: 1.05;
        overflow-wrap: anywhere;
      }

      .markdown-section h2 {
        margin: 1.8rem 0 0.7rem;
        font-size: clamp(1.45rem, 6vw, 1.85rem);
        line-height: 1.15;
        overflow-wrap: anywhere;
      }

      .markdown-section h3 {
        margin: 1.45rem 0 0.55rem;
        font-size: clamp(1.2rem, 5vw, 1.5rem);
        line-height: 1.18;
        overflow-wrap: anywhere;
      }
    }

  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    function normalizeDocPath(path) {
      var normalized = path || "/README.md";
      normalized = normalized.split("?")[0].split("#")[0];

      if (!normalized.startsWith("/")) {
        normalized = "/" + normalized;
      }

      if (!/\.md$/i.test(normalized)) {
        if (!normalized.endsWith("/")) {
          normalized += "/";
        }
        normalized += "README.md";
      }

      return normalized.replace(/\/+/g, "/");
    }

    function currentFileFromRoute(vm) {
      var current = vm.route && (vm.route.file || vm.route.path) ? (vm.route.file || vm.route.path) : "/README.md";
      return normalizeDocPath(current);
    }

    function applySidebarWidth(width) {
      var clamped = Math.max(260, Math.min(680, Math.round(width)));
      document.documentElement.style.setProperty("--sidebar-width", clamped + "px");
      return clamped;
    }

    function loadSidebarWidth() {
      try {
        var stored = window.localStorage.getItem("graiphic-sidebar-width");
        if (!stored) {
          return applySidebarWidth(300);
        }
        return applySidebarWidth(parseInt(stored, 10));
      } catch (error) {
        return applySidebarWidth(300);
      }
    }

    function saveSidebarWidth(width) {
      try {
        window.localStorage.setItem("graiphic-sidebar-width", String(width));
      } catch (error) {
        return;
      }
    }

    function docsifyRouteForPath(path) {
      return "#" + normalizeDocPath(path);
    }

    function docDirectoryPrefix(path) {
      return normalizeDocPath(path).replace(/README\.md$/i, "");
    }

    function isBranchOpen(path, currentFile) {
      var normalizedPath = normalizeDocPath(path);
      if (normalizedPath === currentFile) {
        return true;
      }
      return currentFile.startsWith(docDirectoryPrefix(path));
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function resolveLocalDocLink(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (
        rawHref.startsWith("#") ||
        rawHref.startsWith("mailto:") ||
        rawHref.startsWith("tel:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawHref)
      ) {
        return null;
      }

      var parts = rawHref.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart) {
        return null;
      }

      if (/\.(png|svg|jpe?g|gif|webp|avif)$/i.test(pathPart)) {
        return null;
      }

      if (!/\.md$/i.test(pathPart)) {
        if (/\/$/.test(pathPart)) {
          pathPart += "README.md";
        } else if (!/\.[a-z0-9]+$/i.test(pathPart)) {
          pathPart += "/README.md";
        } else {
          return null;
        }
      }

      var currentDir = currentFile.replace(/[^/]*$/, "");
      var resolved = new URL(pathPart, "https://graiphic.local" + currentDir).pathname.replace(/\/+/g, "/");
      var docsifyHref = "#" + resolved;
      if (anchorPart) {
        docsifyHref += "?id=" + encodeURIComponent(anchorPart);
      }
      return docsifyHref;
    }

    function resolveLocalAssetUrl(rawUrl, currentFile) {
      if (!rawUrl) {
        return null;
      }

      if (
        rawUrl.startsWith("#") ||
        rawUrl.startsWith("data:") ||
        rawUrl.startsWith("blob:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawUrl)
      ) {
        return null;
      }

      var currentDir = currentFile.replace(/[^/]*$/, "");
      var resolvedPath = new URL(rawUrl, "https://graiphic.local" + currentDir).pathname.replace(/\/+/g, "/");
      return new URL(resolvedPath.replace(/^\//, ""), window.location.href.split("#")[0]).href;
    }

    function parseYouTubeVideo(rawUrl) {
      if (!rawUrl || !/^(?:https?:)?\/\//i.test(rawUrl)) {
        return null;
      }

      try {
        var parsed = new URL(rawUrl, window.location.href);
        var host = parsed.hostname.replace(/^www\./i, "").toLowerCase();
        var segments = parsed.pathname.split("/").filter(Boolean);
        var videoId = "";

        if (host === "youtu.be") {
          videoId = segments[0] || "";
        } else if (host === "youtube.com" || host === "m.youtube.com" || host === "youtube-nocookie.com") {
          if (segments[0] === "watch") {
            videoId = parsed.searchParams.get("v") || "";
          } else if (segments[0] === "embed" || segments[0] === "shorts" || segments[0] === "live") {
            videoId = segments[1] || "";
          }
        }

        if (!videoId) {
          return null;
        }

        return {
          videoId: videoId,
          embedUrl: "https://www.youtube.com/embed/" + encodeURIComponent(videoId),
          watchUrl: "https://www.youtube.com/watch?v=" + encodeURIComponent(videoId)
        };
      } catch (error) {
        return null;
      }
    }

    function isStandaloneVideoParagraph(anchor) {
      if (!anchor || !anchor.parentElement || anchor.parentElement.tagName !== "P") {
        return false;
      }

      return Array.prototype.every.call(anchor.parentElement.childNodes, function (node) {
        return node === anchor || (node.nodeType === Node.TEXT_NODE && !node.textContent.trim());
      });
    }

    function buildYouTubeEmbed(videoInfo, label) {
      var wrapper = document.createElement("div");
      wrapper.className = "graiphic-video-embed";

      var frame = document.createElement("div");
      frame.className = "graiphic-video-frame";

      var iframe = document.createElement("iframe");
      iframe.src = videoInfo.embedUrl;
      iframe.title = label || "Embedded YouTube video";
      iframe.loading = "lazy";
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      frame.appendChild(iframe);

      var caption = document.createElement("p");
      caption.className = "graiphic-video-caption";

      var link = document.createElement("a");
      link.href = videoInfo.watchUrl;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = label || "Watch on YouTube";
      caption.appendChild(link);

      wrapper.appendChild(frame);
      wrapper.appendChild(caption);
      return wrapper;
    }

    function enhanceRenderedYouTubeLinks(root) {
      if (!root) {
        return;
      }

      root.querySelectorAll("a[href]").forEach(function (anchor) {
        if (anchor.closest(".graiphic-video-embed")) {
          return;
        }

        var videoInfo = parseYouTubeVideo(anchor.getAttribute("href"));
        if (!videoInfo) {
          return;
        }

        anchor.setAttribute("href", videoInfo.watchUrl);
        anchor.setAttribute("target", "_blank");
        anchor.setAttribute("rel", "noopener noreferrer");

        if (!isStandaloneVideoParagraph(anchor)) {
          return;
        }

        var paragraph = anchor.parentElement;
        var replacement = buildYouTubeEmbed(videoInfo, anchor.textContent.trim());
        paragraph.replaceWith(replacement);
      });
    }

    function getParameterImageKind(img) {
      if (!img || !(img instanceof HTMLImageElement)) {
        return null;
      }

      var iconCell = img.closest('td[width="64"]');
      if (iconCell) {
        return "icon";
      }

      var detailCell = img.closest('td[width="30%"], td[width="25%"], td[width="35%"]');
      if (detailCell) {
        return "detail";
      }

      return null;
    }

    function computeReadableImageWidth(img, kind) {
      var naturalWidth = img.naturalWidth || parseInt(img.getAttribute("width"), 10) || img.width || 0;

      if (!naturalWidth) {
        return null;
      }

      if (kind === "icon") {
        return Math.min(56, Math.max(42, Math.round(naturalWidth * 1.35)));
      }

      if (kind === "detail") {
        if (naturalWidth < 110) {
          return Math.min(180, Math.max(136, Math.round(naturalWidth * 1.7)));
        }

        if (naturalWidth < 170) {
          return Math.min(220, Math.round(naturalWidth * 1.15));
        }

        return Math.min(220, naturalWidth);
      }

      return null;
    }

    function applyParameterImageSizing(img) {
      var kind = getParameterImageKind(img);
      if (!kind) {
        return;
      }

      var targetWidth = computeReadableImageWidth(img, kind);
      if (!targetWidth) {
        return;
      }

      img.dataset.graiphicImageEnhanced = kind;
      img.classList.add(kind === "icon" ? "graiphic-param-icon" : "graiphic-param-detail-image");
      img.style.width = String(targetWidth) + "px";
      img.style.height = "auto";
      img.style.maxWidth = "100%";
    }

    function enhanceParameterImages(root) {
      if (!root) {
        return;
      }

      root.querySelectorAll("img").forEach(function (img) {
        if (img.dataset.graiphicImageEnhanced) {
          return;
        }

        var onReady = function () {
          applyParameterImageSizing(img);
        };

        if (img.complete) {
          onReady();
          return;
        }

        img.addEventListener("load", onReady, { once: true });
      });
    }

    function placeSidebarSearch(attempt) {
      var sidebar = document.querySelector(".sidebar");
      if (!sidebar) {
        return;
      }

      var search = document.querySelector("div.search");
      var appName = sidebar.querySelector(".app-name");

      if (!search) {
        if ((attempt || 0) < 12) {
          window.setTimeout(function () {
            placeSidebarSearch((attempt || 0) + 1);
          }, 120);
        }
        return;
      }

      if (appName) {
        if (search.previousElementSibling !== null || sidebar.firstElementChild !== search || search.nextElementSibling !== appName) {
          sidebar.insertBefore(search, appName);
        }
        return;
      }

      if (sidebar.firstElementChild !== search) {
        sidebar.insertBefore(search, sidebar.firstElementChild);
      }
    }

    function renderNavigationNodes(nodes, currentFile, depth, parentPath) {
      if (!nodes || !nodes.length) {
        return "";
      }

      var listClass = depth === 0 ? "graiphic-nav-list" : "graiphic-nav-children";
      var navState = window.__GRAIPHIC_NAV_STATE__ || { expandedPaths: {}, collapsedPaths: {}, articleGroupsExpanded: {} };
      var pageLimit = 15;
      var totalDirectPages = nodes.filter(function (node) {
        var children = Array.isArray(node.children) ? node.children : [];
        return !children.length && node.kind === "page";
      }).length;
      var articleGroupExpanded = parentPath ? !!navState.articleGroupsExpanded[parentPath] : false;
      var shownDirectPages = 0;
      var hiddenDirectPages = 0;
      var visibleNodes = [];

      nodes.forEach(function (node) {
        var children = Array.isArray(node.children) ? node.children : [];
        var isDirectPage = !children.length && node.kind === "page";
        var active = normalizeDocPath(node.path) === currentFile;

        if (
          parentPath &&
          totalDirectPages > pageLimit &&
          isDirectPage &&
          !articleGroupExpanded &&
          shownDirectPages >= pageLimit &&
          !active
        ) {
          hiddenDirectPages += 1;
          return;
        }

        if (isDirectPage) {
          shownDirectPages += 1;
        }

        visibleNodes.push(node);
      });

      return (
        '<ul class="' + listClass + '">' +
        visibleNodes.map(function (node) {
          var children = Array.isArray(node.children) ? node.children : [];
          var hasChildren = children.length > 0;
          var isCategory = hasChildren || node.kind === "category";
          var active = normalizeDocPath(node.path) === currentFile;
          var normalizedNodePath = normalizeDocPath(node.path);
          var activeTrail = isBranchOpen(node.path, currentFile);
          var manuallyExpanded = !!navState.expandedPaths[normalizedNodePath];
          var manuallyCollapsed = !!navState.collapsedPaths[normalizedNodePath];
          var open = hasChildren && !manuallyCollapsed && (activeTrail || manuallyExpanded);
          var padding = 10 + depth * 13;
          var chevron = hasChildren ? (open ? "v" : ">") : "";
          var cssClass = (isCategory ? "is-category" : "is-page") + (active ? " is-active" : "");
          var itemHtml = "";

          if (isCategory) {
            itemHtml =
              '<button class="graiphic-nav-toggle ' + cssClass + '" type="button" data-nav-path="' + escapeHtml(normalizedNodePath) + '" style="padding-left:' + padding + 'px">' +
                '<span class="graiphic-nav-chevron">' + chevron + '</span>' +
                '<span class="graiphic-nav-label">' + escapeHtml(node.title) + '</span>' +
              "</button>";
          } else {
            itemHtml =
              '<a class="graiphic-nav-link ' + cssClass + '" href="' + docsifyRouteForPath(node.path) + '" style="padding-left:' + padding + 'px">' +
                '<span class="graiphic-nav-chevron"></span>' +
                '<span class="graiphic-nav-label">' + escapeHtml(node.title) + '</span>' +
              "</a>";
          }

          var childrenHtml = open ? renderNavigationNodes(children, currentFile, depth + 1, normalizedNodePath) : "";
          return '<li class="graiphic-nav-item">' + itemHtml + childrenHtml + "</li>";
        }).join("") +
        (
          parentPath && totalDirectPages > pageLimit
            ? '<li class="graiphic-nav-item">' +
                '<button class="graiphic-nav-more-button" type="button" data-group-path="' + escapeHtml(parentPath) + '" style="padding-left:' + (10 + depth * 13) + 'px">' +
                  escapeHtml(articleGroupExpanded ? "Show Less Articles" : "Show All Articles (" + totalDirectPages + ")") +
                "</button>" +
              "</li>"
            : ""
        ) +
        "</ul>"
      );
    }

    function bindSidebarNavigation(vm, navRoot) {
      if (!navRoot || navRoot.__graiphicBound) {
        return;
      }

      navRoot.addEventListener("click", function (event) {
        var articleToggle = event.target.closest(".graiphic-nav-more-button[data-group-path]");
        if (articleToggle) {
          event.preventDefault();
          var articlePath = normalizeDocPath(articleToggle.getAttribute("data-group-path"));
          var navState = window.__GRAIPHIC_NAV_STATE__ || (window.__GRAIPHIC_NAV_STATE__ = { expandedPaths: {}, collapsedPaths: {}, articleGroupsExpanded: {} });
          navState.articleGroupsExpanded[articlePath] = !navState.articleGroupsExpanded[articlePath];
          renderSidebarNavigation(vm);
          return;
        }

        var toggle = event.target.closest(".graiphic-nav-toggle[data-nav-path]");
        if (!toggle) {
          return;
        }

        event.preventDefault();
        var currentFile = currentFileFromRoute(vm);
        var path = normalizeDocPath(toggle.getAttribute("data-nav-path"));

        var navState = window.__GRAIPHIC_NAV_STATE__ || (window.__GRAIPHIC_NAV_STATE__ = { expandedPaths: {}, collapsedPaths: {}, articleGroupsExpanded: {} });
        var activeTrail = isBranchOpen(path, currentFile);
        var manuallyExpanded = !!navState.expandedPaths[path];
        var manuallyCollapsed = !!navState.collapsedPaths[path];
        var currentlyOpen = !manuallyCollapsed && (activeTrail || manuallyExpanded);

        if (currentlyOpen) {
          if (activeTrail) {
            navState.collapsedPaths[path] = true;
          } else {
            delete navState.expandedPaths[path];
          }
        } else {
          delete navState.collapsedPaths[path];
          navState.expandedPaths[path] = true;
        }

        renderSidebarNavigation(vm);
      });

      navRoot.__graiphicBound = true;
    }

    function bindSidebarResize() {
      var sidebar = document.querySelector(".sidebar");
      if (!sidebar || sidebar.__graiphicResizeBound) {
        return;
      }

      var handle = document.createElement("div");
      handle.className = "sidebar-resize-handle";
      handle.setAttribute("role", "separator");
      handle.setAttribute("aria-orientation", "vertical");
      handle.setAttribute("aria-label", "Resize sidebar");
      sidebar.appendChild(handle);

      var isDesktop = function () {
        return window.matchMedia("(min-width: 769px)").matches;
      };

      var activePointerId = null;

      var stopResize = function () {
        activePointerId = null;
        document.body.classList.remove("is-resizing-sidebar");
      };

      handle.addEventListener("pointerdown", function (event) {
        if (!isDesktop() || event.button !== 0) {
          return;
        }

        activePointerId = event.pointerId;
        document.body.classList.add("is-resizing-sidebar");
        handle.setPointerCapture(event.pointerId);
        event.preventDefault();
      });

      handle.addEventListener("pointermove", function (event) {
        if (activePointerId !== event.pointerId || !isDesktop()) {
          return;
        }

        var width = applySidebarWidth(event.clientX);
        saveSidebarWidth(width);
      });

      handle.addEventListener("pointerup", function (event) {
        if (activePointerId !== event.pointerId) {
          return;
        }
        stopResize();
      });

      handle.addEventListener("pointercancel", stopResize);
      window.addEventListener("resize", function () {
        if (!isDesktop()) {
          document.documentElement.style.removeProperty("--sidebar-width");
          return;
        }
        loadSidebarWidth();
      });

      sidebar.__graiphicResizeBound = true;
    }

    function renderSidebarNavigation(vm) {
      var navData = window.__GRAIPHIC_NAV__;
      if (!navData || !Array.isArray(navData.sections)) {
        return;
      }

      var sidebar = document.querySelector(".sidebar");
      if (!sidebar) {
        return;
      }

      var navRoot = sidebar.querySelector(".sidebar-nav");
      if (!navRoot) {
        navRoot = document.createElement("nav");
        navRoot.className = "sidebar-nav";
        sidebar.appendChild(navRoot);
      }

      var currentFile = currentFileFromRoute(vm);
      bindSidebarNavigation(vm, navRoot);
      var html =
        '<div class="graiphic-nav">' +
        navData.sections.map(function (section) {
          var children = Array.isArray(section.children) ? section.children : [];
          return (
            '<section class="graiphic-nav-section">' +
              '<div class="graiphic-nav-section-title">' + escapeHtml(section.title) + "</div>" +
              renderNavigationNodes(children, currentFile, 0, null) +
            "</section>"
          );
        }).join("") +
        "</div>";

      navRoot.innerHTML = html;
    }

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    function startDocsify(navData) {
      window.__GRAIPHIC_NAV__ = navData || { sections: [], searchPaths: "auto" };
      window.__GRAIPHIC_NAV_STATE__ = window.__GRAIPHIC_NAV_STATE__ || { expandedPaths: {}, collapsedPaths: {}, articleGroupsExpanded: {} };

      window.$docsify = {
        name: "Graiphic Documentation",
        repo: "cocotdf/TestDocGraiphicV2",
        homepage: "README.md",
        loadSidebar: false,
        loadNavbar: true,
        notFoundPage: "_404.md",
        subMaxLevel: 2,
        auto2top: true,
        maxLevel: 3,
        relativePath: true,
        alias: {
          "/.*/_navbar.md": "/_navbar.md"
        },
        search: {
          paths: window.__GRAIPHIC_NAV__.searchPaths || "auto",
          placeholder: "Search in the documentation",
          noData: "No matching page found",
          depth: 4,
          hideOtherSidebarContent: false
        },
        plugins: [
          function (hook, vm) {
            hook.beforeEach(function (markdown) {
              var currentFile = currentFileFromRoute(vm);

              return markdown.replace(
                /(<img\b[^>]*\bsrc=["'])([^"']+)(["'][^>]*>)/gi,
                function (match, prefix, rawSrc, suffix) {
                  var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
                  if (!rewrittenSrc) {
                    return match;
                  }
                  return prefix + rewrittenSrc + suffix;
                }
              );
            });

            hook.mounted(function () {
              loadSidebarWidth();
              bindSidebarResize();
              renderSidebarNavigation(vm);
              placeSidebarSearch(0);
            });

            hook.doneEach(function () {
              var currentFile = currentFileFromRoute(vm);
              document.querySelectorAll(".markdown-section a[href], .cover-main a[href], .app-nav a[href]").forEach(function (anchor) {
                var rawHref = anchor.getAttribute("href");
                var rewrittenHref = resolveLocalDocLink(rawHref, currentFile);
                if (rewrittenHref) {
                  anchor.setAttribute("href", rewrittenHref);
                  return;
                }

                var youtubeVideo = parseYouTubeVideo(rawHref);
                if (youtubeVideo) {
                  anchor.setAttribute("href", youtubeVideo.watchUrl);
                  anchor.setAttribute("target", "_blank");
                  anchor.setAttribute("rel", "noopener noreferrer");
                  return;
                }

                if (/^https?:\/\//i.test(rawHref)) {
                  anchor.setAttribute("target", "_blank");
                  anchor.setAttribute("rel", "noopener noreferrer");
                }
              });

              enhanceRenderedYouTubeLinks(document.querySelector(".markdown-section"));
              enhanceRenderedYouTubeLinks(document.querySelector(".cover-main"));
              enhanceParameterImages(document.querySelector(".markdown-section"));
              renderSidebarNavigation(vm);
              placeSidebarSearch(0);
            });
          }
        ]
      };

      loadScript("https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js")
        .then(function () {
          return loadScript("https://cdn.jsdelivr.net/npm/docsify@4");
        })
        .catch(function (error) {
          console.error("Failed to load Docsify assets", error);
        });
    }

    fetch("nav-tree.json")
      .then(function (response) {
        if (!response.ok) {
          throw new Error("Failed to load navigation manifest");
        }
        return response.json();
      })
      .then(function (navData) {
        startDocsify(navData);
      })
      .catch(function (error) {
        console.warn("Navigation manifest unavailable, falling back to default search paths.", error);
        startDocsify({ sections: [], searchPaths: "auto" });
      });
  </script>
</body>
</html>
