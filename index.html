<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Graiphic toolkits documentation hosted on GitHub Pages.">
  <title>Graiphic Documentation</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #0f766e;
      --accent-color: #f97316;
      --body-color: #1f2937;
      --body-bg: #f8fafc;
      --sidebar-bg: #ffffff;
      --sidebar-border-color: #e2e8f0;
      --heading-color: #0f172a;
      --link-color: #0f766e;
      --code-theme-text: #0f172a;
    }

    body {
      background: radial-gradient(circle at top left, #ecfeff 0, #f8fafc 30%, #f8fafc 100%);
    }

    .app-name-link img {
      max-width: 180px;
    }

    .sidebar {
      border-right: 1px solid var(--sidebar-border-color);
      box-shadow: 0 0 24px rgba(15, 23, 42, 0.03);
    }

    .markdown-section {
      max-width: 1100px;
      padding-bottom: 5rem;
    }

    .markdown-section a {
      font-weight: 500;
    }

    .markdown-section img {
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .markdown-section table {
      display: table;
      width: 100%;
      overflow: auto;
      border-collapse: collapse;
    }

    .markdown-section table th {
      background: #eff6ff;
    }

    .search {
      padding-top: 1rem;
      border-bottom: 1px solid var(--sidebar-border-color);
    }

    .search input {
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 0.75rem 0.9rem;
    }

    .cover-main > p:last-child a {
      background: var(--theme-color);
      border-color: var(--theme-color);
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    function currentFileFromRoute(vm) {
      var current = vm.route && (vm.route.file || vm.route.path) ? (vm.route.file || vm.route.path) : "/README.md";
      if (!current.startsWith("/")) {
        current = "/" + current;
      }
      if (!/\.md(?:$|\?)/i.test(current)) {
        if (!current.endsWith("/")) {
          current += "/";
        }
        current += "README.md";
      }
      return current;
    }

    function resolveLocalDocLink(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (
        rawHref.startsWith("#") ||
        rawHref.startsWith("mailto:") ||
        rawHref.startsWith("tel:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawHref)
      ) {
        return null;
      }

      var parts = rawHref.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart) {
        return null;
      }

      if (/\.(png|svg|jpe?g|gif|webp|avif)$/i.test(pathPart)) {
        return null;
      }

      if (!/\.md$/i.test(pathPart)) {
        if (/\/$/.test(pathPart)) {
          pathPart += "README.md";
        } else if (!/\.[a-z0-9]+$/i.test(pathPart)) {
          pathPart += "/README.md";
        } else {
          return null;
        }
      }

      var currentDir = currentFile.replace(/[^/]*$/, "");
      var resolved = new URL(pathPart, "https://graiphic.local" + currentDir).pathname.replace(/\/+/g, "/");
      var docsifyHref = "#" + resolved;
      if (anchorPart) {
        docsifyHref += "?id=" + encodeURIComponent(anchorPart);
      }
      return docsifyHref;
    }

    window.$docsify = {
      name: "Graiphic Documentation",
      repo: "cocotdf/TestDocGraiphicV2",
      homepage: "README.md",
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 3,
      relativePath: true,
      alias: {
        "/.*/_sidebar.md": "/_sidebar.md",
        "/.*/_navbar.md": "/_navbar.md"
      },
      search: {
        paths: "auto",
        placeholder: "Search in the documentation",
        noData: "No matching page found",
        depth: 4,
        hideOtherSidebarContent: true
      },
      plugins: [
        function (hook, vm) {
          hook.doneEach(function () {
            var currentFile = currentFileFromRoute(vm);
            document.querySelectorAll(".markdown-section a[href]").forEach(function (anchor) {
              var rawHref = anchor.getAttribute("href");
              var rewrittenHref = resolveLocalDocLink(rawHref, currentFile);
              if (rewrittenHref) {
                anchor.setAttribute("href", rewrittenHref);
                return;
              }

              if (/^https?:\/\//i.test(rawHref)) {
                anchor.setAttribute("target", "_blank");
                anchor.setAttribute("rel", "noopener noreferrer");
              }
            });
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
