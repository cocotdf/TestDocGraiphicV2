<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Graiphic toolkits documentation hosted on GitHub Pages.">
  <title>Graiphic Documentation</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #0f766e;
      --accent-color: #f97316;
      --body-color: #1f2937;
      --body-bg: #f8fafc;
      --sidebar-bg: #ffffff;
      --sidebar-border-color: #e2e8f0;
      --heading-color: #0f172a;
      --link-color: #0f766e;
      --code-theme-text: #0f172a;
      --sidebar-width: 300px;
    }

    body {
      background: radial-gradient(circle at top left, #ecfeff 0, #f8fafc 30%, #f8fafc 100%);
    }

    .app-name-link img {
      max-width: 180px;
    }

    .sidebar {
      position: relative;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--sidebar-border-color);
      box-shadow: 0 0 24px rgba(15, 23, 42, 0.03);
    }

    .markdown-section {
      max-width: 1100px;
      padding-bottom: 5rem;
    }

    .markdown-section a {
      font-weight: 500;
    }

    .markdown-section table {
      display: table;
      width: 100%;
      overflow: auto;
      border-collapse: collapse;
    }

    .markdown-section table th {
      background: #eff6ff;
    }

    .markdown-section td[width="64"] {
      width: 74px;
    }

    .markdown-section img.graiphic-param-icon {
      display: block;
      margin: 0 auto;
      max-width: 56px;
      height: auto;
    }

    .markdown-section td[width="30%"],
    .markdown-section td[width="25%"],
    .markdown-section td[width="35%"] {
      text-align: center;
      vertical-align: middle;
    }

    .markdown-section td[width="30%"] > p,
    .markdown-section td[width="25%"] > p,
    .markdown-section td[width="35%"] > p {
      margin: 0;
    }

    .markdown-section img.graiphic-param-detail-image {
      display: block;
      margin: 0 auto;
      width: auto;
      max-width: min(220px, 100%);
      height: auto;
    }

    .markdown-section img.graiphic-content-illustration {
      display: block;
      width: min(640px, 100%);
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .markdown-section [data-render-target="github"] {
      display: none !important;
    }

    .graiphic-video-embed {
      width: 100%;
      max-width: 520px;
      margin: 1.25rem 0;
    }

    .graiphic-video-frame {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
      background: #0f172a;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
    }

    .graiphic-video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .graiphic-video-caption {
      margin: 0.7rem 0 0;
      font-size: 0.95rem;
      color: #475569;
    }

    .search {
      order: 0;
      padding: 1rem 1rem 0.35rem;
      border-bottom: 0;
    }

    .search input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 0.75rem 0.9rem;
      background: #ffffff;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .search .results-panel {
      display: none;
      margin-top: 0.5rem;
      border-radius: 12px;
      border: 1px solid #dbe5ef;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.1);
      overflow: hidden;
      background: #ffffff;
    }

    .search .results-panel.show {
      display: block;
    }

    .search .input-wrap {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .search .clear-button {
      display: none;
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }

    .search .clear-button.show {
      display: inline-flex;
    }

    .search .matching-post {
      border-bottom: 1px solid #e2e8f0;
    }

    .search .matching-post:last-child {
      border-bottom: 0;
    }

    .search .matching-post a {
      display: block;
      padding: 0.9rem 1rem;
      color: inherit;
      text-decoration: none;
    }

    .search .matching-post a:hover {
      background: #f8fafc;
    }

    .search .matching-post h2 {
      margin: 0 0 0.35rem;
      font-size: 1rem;
      line-height: 1.35;
      color: #0f172a;
    }

    .search .matching-post p {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.45;
      color: #475569;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .search .search-keyword {
      font-style: normal;
      font-weight: 700;
      color: #0f766e;
    }

    .search p.empty {
      margin: 0;
      padding: 1rem;
      text-align: center;
      color: #475569;
    }

    .app-name {
      order: 1;
      margin: 0;
      padding: 0.25rem 1rem 1rem;
    }

    .app-name a {
      color: #334155;
      font-size: 1.18rem;
      font-weight: 300;
      line-height: 1.18;
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .app-name a:hover {
      color: #0f766e;
    }

    .sidebar-nav {
      order: 2;
      padding: 1rem 0 2rem;
    }

    .graiphic-home-hero {
      margin: 0 0 2rem;
      padding: 2rem 2.1rem;
      border: 1px solid #d8ecf2;
      border-radius: 30px;
      background:
        radial-gradient(circle at top right, rgba(251, 191, 36, 0.14), transparent 32%),
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 30%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98));
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.05);
    }

    .graiphic-home-kicker {
      margin: 0 0 1rem;
      font-size: clamp(1.9rem, 3.4vw, 2.7rem);
      font-weight: 650;
      line-height: 1.14;
      color: #0f172a;
      letter-spacing: -0.03em;
    }

    .graiphic-home-kicker-line {
      display: block;
    }

    .graiphic-home-kicker-line + .graiphic-home-kicker-line {
      margin-top: 0.34em;
    }

    .graiphic-home-lead {
      margin: 0 0 1.35rem;
      max-width: 950px;
      font-size: 1.08rem;
      line-height: 1.7;
      color: #334155;
    }

    .graiphic-home-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin: 0 0 1.45rem;
    }

    .markdown-section .graiphic-home-pill {
      display: inline-flex;
      align-items: center;
      padding: 0.62rem 1rem;
      border-radius: 999px;
      background: #ecfeff;
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.08);
    }

    .graiphic-home-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin: 0 0 0.9rem;
    }

    .markdown-section a.graiphic-home-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      border: 1px solid #7dd3c7;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
    }

    .markdown-section a.graiphic-home-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      text-decoration: none;
    }

    .markdown-section a.graiphic-home-button-primary {
      background: #ecfeff;
      color: #0f766e;
    }

    .markdown-section a.graiphic-home-button-secondary {
      background: #ffffff;
      color: #0f766e;
    }

    .graiphic-home-note {
      margin: 0;
      color: #64748b;
      font-size: 0.97rem;
      line-height: 1.55;
    }

    .graiphic-home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1rem;
      margin: 1rem 0 2rem;
    }

    .markdown-section a.graiphic-home-card {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding: 1.1rem 1rem;
      border: 1px solid #dceaf1;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.82);
      color: #0f172a;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .markdown-section a.graiphic-home-card:hover {
      transform: translateY(-2px);
      border-color: #99f6e4;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
      text-decoration: none;
    }

    .graiphic-home-card-media {
      display: flex;
      align-items: center;
      min-height: 66px;
    }

    .graiphic-home-card-media img {
      max-height: 62px;
      width: auto;
      object-fit: contain;
    }

    .graiphic-home-card-title {
      font-size: 1.06rem;
      font-weight: 750;
      color: #0f172a;
    }

    .graiphic-home-card-copy {
      color: #475569;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .sidebar-resize-handle {
      position: absolute;
      top: 0;
      right: -4px;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      z-index: 30;
      background: transparent;
    }

    .sidebar-resize-handle::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 3px;
      width: 2px;
      background: transparent;
      transition: background-color 0.15s ease;
    }

    .sidebar-resize-handle:hover::after,
    body.is-resizing-sidebar .sidebar-resize-handle::after {
      background: #99f6e4;
    }

    .graiphic-nav {
      font-size: 14px;
    }

    .graiphic-nav-section + .graiphic-nav-section {
      margin-top: 0.55rem;
    }

    .graiphic-nav-section-title {
      padding: 0.2rem 0.9rem 0.3rem;
      color: #64748b;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .graiphic-nav-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .graiphic-nav-children {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .graiphic-nav-item {
      margin: 0;
    }

    .graiphic-nav-link,
    .graiphic-nav-toggle {
      display: flex;
      width: 100%;
      align-items: flex-start;
      gap: 0.3rem;
      min-height: 1.55rem;
      padding-top: 0.16rem;
      padding-bottom: 0.16rem;
      border-left: 2px solid transparent;
      text-decoration: none;
      line-height: 1.25;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .graiphic-nav-link:hover,
    .graiphic-nav-toggle:hover {
      background: #f8fafc;
      text-decoration: none;
    }

    .graiphic-nav-toggle {
      background: transparent;
      border-top: 0;
      border-right: 0;
      border-bottom: 0;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .graiphic-nav-toggle.is-category,
    .graiphic-nav-link.is-category {
      color: #56a06c;
      font-weight: 500;
    }

    .graiphic-nav-link.is-page {
      color: #111827;
      font-weight: 500;
    }

    .graiphic-nav-link.is-active,
    .graiphic-nav-toggle.is-active {
      color: var(--theme-color);
      background: #f0fdfa;
      border-left-color: var(--theme-color);
      font-weight: 700;
    }

    .graiphic-nav-chevron {
      width: 0.95rem;
      height: 0.95rem;
      flex: 0 0 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 0.72rem;
      line-height: 1;
    }

    .graiphic-nav-chevron.is-plusminus {
      border: 1px solid var(--sidebar-border-color);
      border-radius: 5px;
      background: var(--surface-bg);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.55);
      font-weight: 700;
    }

    .graiphic-nav-toggle:hover .graiphic-nav-chevron.is-plusminus {
      border-color: var(--button-border);
      background: var(--surface-muted);
    }

    .graiphic-nav-toggle.is-active .graiphic-nav-chevron.is-plusminus {
      color: var(--theme-color);
      border-color: color-mix(in srgb, var(--theme-color) 32%, var(--sidebar-border-color));
      background: color-mix(in srgb, var(--theme-color) 10%, var(--surface-bg));
    }

    .graiphic-nav-chevron.is-empty {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }

    .graiphic-nav-label {
      flex: 1 1 auto;
      min-width: 0;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .graiphic-nav-more-button {
      width: 100%;
      padding-top: 0.18rem;
      padding-bottom: 0.18rem;
      background: transparent;
      border: 0;
      color: #94a3b8;
      font: inherit;
      font-size: 0.92em;
      text-align: left;
      cursor: pointer;
    }

    .graiphic-nav-more-button:hover {
      color: #64748b;
      background: #f8fafc;
    }

    .cover-main > p:last-child a {
      background: var(--theme-color);
      border-color: var(--theme-color);
    }

    @media screen and (min-width: 769px) {
      .sidebar {
        width: var(--sidebar-width);
      }

      .content {
        left: var(--sidebar-width);
      }
    }

    @media screen and (max-width: 768px) {
      .app-nav {
        position: static;
        margin: 0;
        padding: 0.75rem 3.9rem 0.45rem 0.85rem;
        text-align: left;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        background: rgba(255, 255, 255, 0.9);
        border-bottom: 1px solid var(--sidebar-border-color);
        backdrop-filter: blur(10px);
      }

      .app-nav ul {
        display: flex;
        flex-wrap: nowrap;
        gap: 0.45rem;
        margin: 0;
        padding: 0;
      }

      .app-nav li {
        display: block;
        flex: 0 0 auto;
        margin: 0;
        padding: 0;
      }

      .app-nav a {
        display: block;
        padding: 0.38rem 0.7rem;
        font-size: 0.92rem;
        line-height: 1.2;
        border: 1px solid #dbe5ef;
        border-radius: 999px;
        background: #fff;
      }

      .app-nav a.active {
        border-bottom: 1px solid #99f6e4;
        background: #f0fdfa;
      }

      .app-nav::-webkit-scrollbar {
        height: 0;
      }

      .github-corner {
        display: none;
      }

      .content {
        padding-top: 0;
      }

      .markdown-section {
        max-width: 100%;
        padding: 1.1rem 1rem 2.75rem;
      }

      .graiphic-home-hero {
        padding: 1.5rem 1.2rem;
        border-radius: 24px;
      }

      .graiphic-home-lead {
        font-size: 1rem;
      }

      .markdown-section a.graiphic-home-button {
        width: 100%;
        min-width: 0;
      }

      .markdown-section h1 {
        margin: 0 0 0.85rem;
        font-size: clamp(1.9rem, 8vw, 2.35rem);
        line-height: 1.05;
        overflow-wrap: anywhere;
      }

      .markdown-section h2 {
        margin: 1.8rem 0 0.7rem;
        font-size: clamp(1.45rem, 6vw, 1.85rem);
        line-height: 1.15;
        overflow-wrap: anywhere;
      }

      .markdown-section h3 {
        margin: 1.45rem 0 0.55rem;
        font-size: clamp(1.2rem, 5vw, 1.5rem);
        line-height: 1.18;
        overflow-wrap: anywhere;
      }
    }

  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    function normalizeDocPath(path) {
      var normalized = path || "/README.md";
      normalized = normalized.split("?")[0].split("#")[0];

      if (!normalized.startsWith("/")) {
        normalized = "/" + normalized;
      }

      if (!/\.md$/i.test(normalized)) {
        if (!normalized.endsWith("/")) {
          normalized += "/";
        }
        normalized += "README.md";
      }

      return normalized.replace(/\/+/g, "/");
    }

    function currentFileFromRoute(vm) {
      var current = vm.route && (vm.route.file || vm.route.path) ? (vm.route.file || vm.route.path) : "/README.md";
      return normalizeDocPath(current);
    }

    function collectKnownDocPaths(navData) {
      var knownDocPaths = {};

      function rememberPath(path) {
        if (!path) {
          return;
        }

        knownDocPaths[normalizeDocPath(path)] = true;
      }

      function visitNodes(nodes) {
        if (!Array.isArray(nodes)) {
          return;
        }

        nodes.forEach(function (node) {
          if (!node) {
            return;
          }

          rememberPath(node.path);
          visitNodes(node.children);
        });
      }

      if (navData && Array.isArray(navData.searchPaths)) {
        navData.searchPaths.forEach(rememberPath);
      }

      if (navData && Array.isArray(navData.sections)) {
        navData.sections.forEach(function (section) {
          visitNodes(section && section.children);
        });
      }

      return knownDocPaths;
    }

    function hasKnownDocPaths(knownDocPaths) {
      for (var path in knownDocPaths) {
        if (Object.prototype.hasOwnProperty.call(knownDocPaths, path)) {
          return true;
        }
      }

      return false;
    }

    function extractSearchResultDocPath(rawHref) {
      if (!rawHref) {
        return null;
      }

      var candidate = String(rawHref).trim();

      if (!candidate) {
        return null;
      }

      if (/^(?:https?:)?\/\//i.test(candidate)) {
        try {
          var parsed = new URL(candidate, window.location.href);
          if (parsed.origin !== window.location.origin) {
            return null;
          }

          if (parsed.hash && /^#\//.test(parsed.hash)) {
            candidate = parsed.hash.slice(1);
          } else {
            candidate = parsed.pathname + (parsed.search || "") + (parsed.hash || "");
          }
        } catch (error) {
          return null;
        }
      } else if (candidate.indexOf("/#/") !== -1) {
        candidate = candidate.slice(candidate.indexOf("/#/") + 2);
      } else if (candidate.indexOf("#/") === 0) {
        candidate = candidate.slice(1);
      } else if (candidate.charAt(0) === "#") {
        candidate = candidate.slice(1);
      }

      candidate = candidate.replace(/^\/?TestDocGraiphicV2(?=\/)/i, "");

      var candidatePath = candidate.split("?")[0].split("#")[0];
      if (!candidatePath || candidatePath === "/") {
        return null;
      }

      if (candidate.charAt(0) !== "/") {
        candidate = "/" + candidate;
      }

      return normalizeDocPath(candidate);
    }

    function shouldKeepSearchResultHref(rawHref, knownDocPaths) {
      var docPath = extractSearchResultDocPath(rawHref);

      if (!docPath) {
        return true;
      }

      return !!(knownDocPaths && knownDocPaths[docPath]);
    }

    function applySidebarWidth(width) {
      var clamped = Math.max(260, Math.min(680, Math.round(width)));
      document.documentElement.style.setProperty("--sidebar-width", clamped + "px");
      return clamped;
    }

    function loadSidebarWidth() {
      try {
        var stored = window.localStorage.getItem("graiphic-sidebar-width");
        if (!stored) {
          return applySidebarWidth(300);
        }
        return applySidebarWidth(parseInt(stored, 10));
      } catch (error) {
        return applySidebarWidth(300);
      }
    }

    function saveSidebarWidth(width) {
      try {
        window.localStorage.setItem("graiphic-sidebar-width", String(width));
      } catch (error) {
        return;
      }
    }

    function docsifyRouteForPath(path) {
      return "#" + normalizeDocPath(path);
    }

    function docDirectoryPrefix(path) {
      return normalizeDocPath(path).replace(/README\.md$/i, "");
    }

    function isBranchOpen(path, currentFile) {
      var normalizedPath = normalizeDocPath(path);
      if (normalizedPath === currentFile) {
        return true;
      }
      return currentFile.startsWith(docDirectoryPrefix(path));
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function resolveLocalDocLink(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (
        rawHref.startsWith("#") ||
        rawHref.startsWith("mailto:") ||
        rawHref.startsWith("tel:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawHref)
      ) {
        return null;
      }

      var parts = rawHref.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart) {
        return null;
      }

      if (/\.(png|svg|jpe?g|gif|webp|avif)$/i.test(pathPart)) {
        return null;
      }

      if (!/\.md$/i.test(pathPart)) {
        if (/\/$/.test(pathPart)) {
          pathPart += "README.md";
        } else if (!/\.[a-z0-9]+$/i.test(pathPart)) {
          pathPart += "/README.md";
        } else {
          return null;
        }
      }

        }

        activePointerId = event.pointerId;
        document.body.classList.add("is-resizing-sidebar");
        handle.setPointerCapture(event.pointerId);
        event.preventDefault();
      });

      handle.addEventListener("pointermove", function (event) {
        if (activePointerId !== event.pointerId || !isDesktop()) {
          return;
        }

        var width = applySidebarWidth(event.clientX);
        saveSidebarWidth(width);
      });

      handle.addEventListener("pointerup", function (event) {
        if (activePointerId !== event.pointerId) {
          return;
        }
        stopResize();
      });

      handle.addEventListener("pointercancel", stopResize);
      window.addEventListener("resize", function () {
        if (!isDesktop()) {
          document.documentElement.style.removeProperty("--sidebar-width");
          return;
        }
        loadSidebarWidth();
      });

      sidebar.__graiphicResizeBound = true;
    }

    function renderSidebarNavigation(vm) {
      var navData = window.__GRAIPHIC_NAV__;
      if (!navData || !Array.isArray(navData.sections)) {
        return;
      }

      var sidebar = document.querySelector(".sidebar");
      if (!sidebar) {
        return;
      }

      var navRoot = sidebar.querySelector(".sidebar-nav");
      if (!navRoot) {
        navRoot = document.createElement("nav");
        navRoot.className = "sidebar-nav";
        sidebar.appendChild(navRoot);
      }

      var currentFile = currentFileFromRoute(vm);
      bindSidebarNavigation(vm, navRoot);
      var html =
        '<div class="graiphic-nav">' +
        navData.sections.map(function (section) {
          var children = Array.isArray(section.children) ? section.children : [];
          return (
            '<section class="graiphic-nav-section">' +
              '<div class="graiphic-nav-section-title">' + escapeHtml(section.title) + "</div>" +
              renderNavigationNodes(children, currentFile, 0, null) +
            "</section>"
          );
        }).join("") +
        "</div>";

      navRoot.innerHTML = html;
    }

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    function startDocsify(navData, searchData) {
      window.__GRAIPHIC_NAV__ = navData || { sections: [], searchPaths: "auto" };
      window.__GRAIPHIC_KNOWN_DOC_PATHS__ = collectKnownDocPaths(window.__GRAIPHIC_NAV__);
      window.__GRAIPHIC_SEARCH_INDEX__ = searchData && Array.isArray(searchData.items)
        ? searchData.items
        : buildFallbackSearchIndex(window.__GRAIPHIC_NAV__);
      window.__GRAIPHIC_SEARCH_QUERY__ = window.__GRAIPHIC_SEARCH_QUERY__ || "";
      window.__GRAIPHIC_NAV_STATE__ = window.__GRAIPHIC_NAV_STATE__ || { expandedPaths: {}, collapsedPaths: {}, articleGroupsExpanded: {} };

      window.$docsify = {
        name: "Graiphic Documentation",
        repo: "cocotdf/TestDocGraiphicV2",
        homepage: "README.md",
        loadSidebar: false,
        loadNavbar: true,
        notFoundPage: "_404.md",
        subMaxLevel: 2,
        auto2top: true,
        maxLevel: 3,
        relativePath: true,
        alias: {
          "/.*/_navbar.md": "/_navbar.md"
        },
        plugins: [
          function (hook, vm) {
            hook.beforeEach(function (markdown) {
              var currentFile = currentFileFromRoute(vm);

              return markdown.replace(
                /(<img\b[^>]*\bsrc=["'])([^"']+)(["'][^>]*>)/gi,
                function (match, prefix, rawSrc, suffix) {
                  var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
                  if (!rewrittenSrc) {
                    return match;
                  }
                  return prefix + rewrittenSrc + suffix;
                }
              );
            });

            hook.mounted(function () {
              loadSidebarWidth();
              bindSidebarResize();
              renderSidebarNavigation(vm);
              placeSidebarSearch();
            });

            hook.doneEach(function () {
              var currentFile = currentFileFromRoute(vm);
              document.querySelectorAll(".markdown-section a[href], .cover-main a[href], .app-nav a[href]").forEach(function (anchor) {
                var rawHref = anchor.getAttribute("href");
                var rewrittenHref = resolveLocalDocLink(rawHref, currentFile);
                if (rewrittenHref) {
                  anchor.setAttribute("href", rewrittenHref);
                  return;
                }

                var youtubeVideo = parseYouTubeVideo(rawHref);
                if (youtubeVideo) {
                  anchor.setAttribute("href", youtubeVideo.watchUrl);
                  anchor.setAttribute("target", "_blank");
                  anchor.setAttribute("rel", "noopener noreferrer");
                  return;
                }

                if (/^https?:\/\//i.test(rawHref)) {
                  anchor.setAttribute("target", "_blank");
                  anchor.setAttribute("rel", "noopener noreferrer");
                }
              });

              enhanceRenderedYouTubeLinks(document.querySelector(".markdown-section"));
              enhanceRenderedYouTubeLinks(document.querySelector(".cover-main"));
              enhanceParameterImages(document.querySelector(".markdown-section"));
              enhanceContentIllustrationImages(document.querySelector(".markdown-section"));
              renderSidebarNavigation(vm);
              placeSidebarSearch();
            });
          }
        ]
      };

      loadScript("https://cdn.jsdelivr.net/npm/docsify@4")
        .catch(function (error) {
          console.error("Failed to load Docsify assets", error);
        });
    }

    Promise.all([
      fetch("nav-tree.json").then(function (response) {
        if (!response.ok) {
          throw new Error("Failed to load navigation manifest");
        }
        return response.json();
      }),
      fetch("search-manifest.json")
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Failed to load search manifest");
          }
          return response.json();
        })
        .catch(function (error) {
          console.warn("Search manifest unavailable, falling back to title-only search.", error);
          return null;
        })
    ])
      .then(function (results) {
        startDocsify(results[0], results[1]);
      })
      .catch(function (error) {
        console.warn("Navigation manifest unavailable, falling back to minimal navigation.", error);
        startDocsify({ sections: [], searchPaths: "auto" }, { items: [] });
      });
  </script>
</body>
</html>
